name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Generate Terminal Header
        uses: dkhokhlov/metrics@master
        with:
          filename: github-metrics-terminal.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: anka-afk
          template: terminal
          base: header
          plugin_languages: no

      - name: Generate Plugins Content
        uses: lowlighter/metrics@latest
        with:
          filename: github-metrics-plugins.svg
          token: ${{ secrets.METRICS_TOKEN }}
          user: anka-afk
          template: classic
          base: ""
          config_timezone: Asia/Shanghai
          plugin_achievements: yes
          plugin_achievements_display: detailed
          plugin_achievements_secrets: yes
          plugin_achievements_threshold: C
          plugin_habits: yes
          plugin_habits_from: 200
          plugin_habits_days: 14
          plugin_habits_facts: yes
          plugin_habits_charts: yes
          plugin_steam: yes
          plugin_steam_token: ${{ secrets.STEAM_TOKEN }}
          plugin_steam_user: "76561198807374746"
          plugin_steam_sections: recently-played, detailed-history
          plugin_steam_games_limit: 2
