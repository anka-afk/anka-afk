name: Metrics
on:
  schedule: [{cron: "0 0 * * *"}]
  workflow_dispatch:
  push: {branches: ["master", "main"]}

jobs:
  github-metrics:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: lowlighter/metrics@latest
        with:
          token: ${{ secrets.METRICS_TOKEN }}
          user: anka-afk
          template: classic
          base: header
          config_timezone: Asia/Shanghai
          theme: dark
          plugin_isocalendar: yes
          plugin_isocalendar_duration: half-year
          plugin_languages: no
          plugin_lines: yes
          plugin_stargazers: yes
          plugin_stargazers_limit: 4
          plugin_projects: no
